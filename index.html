<html lang="en-GB">
<head>
<meta charset="UTF-8">

<title>Power Analytix · Invoice Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1728; --brand:#3538CD; --brand-dark:#272AA8; --accent:#13C6B6;
    --tint:#EEF0FF; --line:#E6E8F0; --muted:#667085; --paper:#FFFFFF; --bg:#EBEDF3;
    --amber:#B9770E; --amber-bg:#FCF3E3;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--ink);
    line-height:1.4;-webkit-font-smoothing:antialiased;padding:24px 16px 60px;font-variant-numeric:tabular-nums;}
  .num{font-variant-numeric:tabular-nums;}
  h2,h1,.wordmark,.doc-title h1,.eyebrow,.grand .k,.items thead th{font-family:'Space Grotesk',sans-serif;}

  /* ---------- control bar (screen only) ---------- */
  .controls{max-width:800px;margin:0 auto 18px;background:var(--paper);border-radius:12px;
    box-shadow:0 1px 2px rgba(15,23,40,.06),0 10px 30px -18px rgba(15,23,40,.4);padding:16px 18px;}
  .controls h2{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--brand);margin-bottom:12px;}
  .ctl-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
  label.field{display:flex;flex-direction:column;gap:4px;font-size:11px;font-weight:600;color:var(--muted);}
  select,.import-btn,input.cfg{font-family:'Inter',sans-serif;font-size:13px;border:1px solid var(--line);
    border-radius:8px;padding:9px 12px;background:#fff;color:var(--ink);}
  select{min-width:280px;font-weight:600;cursor:pointer;}
  .grow{flex:1;}
  .btns{display:flex;gap:8px;flex-wrap:wrap;}
  .import-btn{display:inline-flex;align-items:center;gap:6px;font-weight:600;color:var(--brand-dark);
    border-color:#D5D7F5;background:var(--tint);cursor:pointer;}
  .import-btn:hover{background:#E4E6FB;} .import-btn input{display:none;}
  .btn{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;background:var(--brand);
    color:#fff;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;transition:background .15s,transform .15s;}
  .btn:hover{background:var(--brand-dark);transform:translateY(-1px);}
  .btn:focus-visible,select:focus-visible,.import-btn:focus-visible,input.cfg:focus-visible{outline:3px solid #B9BBF0;outline-offset:2px;}
  details.cfg-panel{margin-top:14px;border:1px solid var(--line);border-radius:10px;padding:0 14px;}
  details.cfg-panel summary{cursor:pointer;font-size:12px;font-weight:700;color:var(--brand-dark);padding:11px 0;list-style:none;}
  details.cfg-panel summary::-webkit-details-marker{display:none;}
  details.cfg-panel summary::before{content:"▸ ";color:var(--brand);}
  details.cfg-panel[open] summary::before{content:"▾ ";}
  .cfg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;padding:4px 0 16px;}
  .cfg-grid label{display:flex;flex-direction:column;gap:4px;font-size:10.5px;font-weight:600;color:var(--muted);}
  input.cfg{width:100%;}
  .acct{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:10px 12px;
    background:var(--tint);border:1px solid #D5D7F5;border-radius:9px;font-size:12.5px;}
  .acct .who{color:var(--ink);font-weight:600;}
  .acct .dot{width:8px;height:8px;border-radius:50%;background:#C2C5D6;flex:0 0 auto;}
  .acct .dot.on{background:#16C2B0;} .acct .dot.err{background:#D9534F;}
  .acct .spacer{flex:1;}
  .acct button{font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;border:1px solid #D5D7F5;
    background:#fff;color:var(--brand-dark);border-radius:7px;padding:7px 13px;cursor:pointer;}
  .acct button.primary{background:var(--brand);color:#fff;border-color:var(--brand);}
  .acct button:hover{filter:brightness(.97);}
  .status{margin-top:12px;font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:14px;}
  .status b{color:var(--ink);font-weight:600;}
  .warn{margin-top:12px;background:var(--amber-bg);border:1px solid #F0DDB6;color:var(--amber);
    border-radius:8px;padding:10px 14px;font-size:12.5px;display:none;}
  .warn.show{display:block;}

  /* ---------- invoice sheet ---------- */
  .sheet{max-width:800px;margin:0 auto;background:var(--paper);border-radius:14px;overflow:hidden;
    box-shadow:0 1px 2px rgba(15,23,40,.06),0 24px 60px -28px rgba(15,23,40,.35);}
  header.inv{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding:30px 44px 22px;}
  .logo-row{display:flex;align-items:center;gap:13px;}
  .emblem{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(145deg,var(--brand) 0%,#5457E0 100%);box-shadow:0 6px 16px -6px rgba(53,56,205,.6);}
  .emblem svg{width:24px;height:24px;}
  .wordmark{line-height:1.05;}
  .wordmark .p{display:block;font-weight:700;font-size:22px;letter-spacing:.005em;color:var(--ink);}
  .wordmark .a{display:block;font-weight:700;font-size:22px;letter-spacing:.005em;color:var(--brand);margin-top:-2px;}
  .wordmark .tag{display:block;font-family:'Inter',sans-serif;font-size:9.5px;font-weight:600;letter-spacing:.16em;
    text-transform:uppercase;color:var(--muted);margin-top:5px;}
  .doc-title{text-align:right;}
  .doc-title h1{font-weight:700;font-size:32px;letter-spacing:.05em;color:var(--ink);}
  .doc-title .inv-no{margin-top:3px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:var(--brand);}
  .rule{height:4px;background:linear-gradient(90deg,var(--brand) 0%,var(--brand) 68%,var(--accent) 68%,var(--accent) 100%);}

  .meta{display:grid;grid-template-columns:1.05fr 1.05fr .9fr;gap:28px;padding:22px 44px 4px;}
  .eyebrow{font-weight:700;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--brand);margin-bottom:7px;}
  .block .name{font-weight:700;font-size:14px;margin-bottom:2px;}
  .block .ln{font-size:12px;}
  .block .sub{font-size:11.5px;color:var(--muted);margin-top:5px;}
  .block .sub b{color:var(--ink);font-weight:600;}
  .detail-row{display:flex;justify-content:space-between;font-size:12px;padding:2.5px 0;gap:12px;}
  .detail-row span:first-child{color:var(--muted);}
  .detail-row span:last-child{font-weight:600;text-align:right;}
  .detail-row.due{margin-top:5px;padding-top:7px;border-top:1px solid var(--line);}
  .detail-row.due span:last-child{color:var(--brand);font-weight:700;}
  .invfor{margin:18px 44px 0;padding:10px 15px;background:var(--tint);border-radius:9px;font-size:12.5px;}
  .invfor b{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--brand-dark);}

  table.items{width:100%;border-collapse:collapse;margin:16px 0 0;}
  .items thead th{font-weight:700;font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:#fff;
    background:var(--ink);padding:10px 10px;text-align:left;}
  .items thead th.r{text-align:right;} .items thead th.c{text-align:center;}
  .items thead th:first-child{padding-left:44px;} .items thead th:last-child{padding-right:44px;}
  .items tbody td{padding:9px 10px;font-size:12.5px;border-bottom:1px solid var(--line);vertical-align:top;}
  .items tbody td:first-child{padding-left:44px;color:var(--muted);font-weight:600;}
  .items tbody td:last-child{padding-right:44px;}
  .items tbody td.r{text-align:right;} .items tbody td.c{text-align:center;}
  .items .desc{font-weight:500;} .items .amt{font-weight:700;}
  .items tbody tr:nth-child(even){background:#FAFAFE;}

  .foot{display:grid;grid-template-columns:1fr 310px;gap:0;align-items:end;}
  .pay{padding:22px 0 0 44px;}
  .pay .eyebrow{margin-bottom:9px;}
  .pay-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 16px;font-size:12px;}
  .pay-grid .k{color:var(--muted);} .pay-grid .v{font-weight:600;}
  .terms{margin-top:14px;font-size:11px;color:var(--muted);max-width:320px;}
  .terms b{color:var(--ink);font-weight:600;}
  .totals{padding:22px 44px 0 0;}
  .tline{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;}
  .tline .k{color:var(--muted);} .tline .v{font-weight:600;}
  .tline.sep{border-top:1px solid var(--line);}
  .grand{margin-top:10px;background:var(--brand);color:#fff;border-radius:11px;padding:14px 18px;
    display:flex;justify-content:space-between;align-items:center;}
  .grand .k{font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;}
  .grand .v{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;}
  .baseline{margin-top:26px;padding:15px 44px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;gap:16px;font-size:11px;color:var(--muted);}
  .baseline .vat{font-weight:600;color:var(--ink);}

  @media (max-width:680px){
    header.inv{flex-direction:column;} .doc-title{text-align:left;}
    .meta{grid-template-columns:1fr;gap:18px;} .foot{grid-template-columns:1fr;}
    header.inv,.meta,.invfor,.baseline,.pay,.totals{padding-left:22px;padding-right:22px;}
    .items thead th:first-child,.items tbody td:first-child{padding-left:22px;}
    .items thead th:last-child,.items tbody td:last-child{padding-right:22px;}
    select{min-width:0;width:100%;}
  }

  /* ---------- single A4 page print ---------- */
  @media print{
    @page{size:A4 portrait;margin:11mm;}
    html,body{background:#fff;padding:0;margin:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;font-size:10.5px;}
    .controls{display:none!important;}
    .sheet{box-shadow:none;border-radius:0;max-width:none;width:100%;}
    header.inv{padding:6px 6px 12px;} 
    .emblem{width:38px;height:38px;} .emblem svg{width:21px;height:21px;}
    .wordmark .p,.wordmark .a{font-size:19px;}
    .doc-title h1{font-size:27px;}
    .rule{height:3px;}
    .meta{padding:14px 6px 2px;gap:18px;}
    .invfor{margin:11px 6px 0;padding:7px 12px;}
    .items{margin-top:12px;}
    .items thead th{padding:7px 9px;}
    .items thead th:first-child{padding-left:6px;} .items thead th:last-child{padding-right:6px;}
    .items tbody td{padding:6.5px 9px;font-size:11px;}
    .items tbody td:first-child{padding-left:6px;} .items tbody td:last-child{padding-right:6px;}
    .items tbody tr,.items thead tr{page-break-inside:avoid;}
    .foot{padding-top:4px;} .pay{padding:16px 0 0 6px;} .totals{padding:16px 6px 0 0;}
    .grand{padding:12px 16px;} .grand .v{font-size:20px;}
    .baseline{margin-top:16px;padding:11px 6px;}
    .sheet,.foot,.totals,.pay,.items{page-break-inside:auto;}
  }
</style>
</head>

<script>

let DETAILS = [

/* ===================== HELPERS ===================== */
function seller(){
  const g=id=>(document.getElementById(id)?.value||'').trim();
  return {name:g('s_name')||'Power Analytix', tag:g('s_tag'), a1:g('s_a1'), a2:g('s_a2'),
    phone:g('s_phone'), email:g('s_email'), vat:g('s_vat'), company:g('s_company'),
    sort:g('s_sort'), account:g('s_account'), terms:parseInt(g('s_terms'))||14};
}
const money = n => '£' + (Number(n)||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
const num = s => { if(s==null) return 0; const v=parseFloat(String(s).replace(/[^0-9.\-]/g,'')); return isNaN(v)?0:v; };
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function parseRate(s){ if(s==null) return 0.20; if(typeof s==='number') return s>1?s/100:s;
  const v=num(s); return String(s).includes('%')||v>1 ? v/100 : v; }
function dParts(s){ const str=String(s||'').trim().split('T')[0]; const p=str.split(/[\/\-]/).map(x=>x.trim());
  if(p.length!==3) return null; let d,m,y;
  if(p[0].length===4){y=+p[0];m=+p[1];d=+p[2];} else {m=+p[0];d=+p[1];y=+p[2];}
  if(!y||y<2000) return null; const dt=new Date(y,m-1,d); return isNaN(dt)?null:dt; }
function fmtDate(s){ const dt=dParts(s); return dt?dt.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):String(s||''); }
function addDays(s,days){ const dt=dParts(s); if(!dt) return ''; dt.setDate(dt.getDate()+days);
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); }
function companyNum(c){ const m=String(c||'').match(/^\s*(\d+)/); return m?+m[1]:null; }
function findCustomer(inv){ const n=companyNum(inv.company);
  let c=n!=null?CUSTOMERS.find(x=>+x.num===n):null;
  if(!c){const nm=String(inv.company||'').replace(/^\s*\d+\s*-\s*/,'').trim().toLowerCase();
    c=CUSTOMERS.find(x=>String(x.name||'').trim().toLowerCase()===nm);} return c||null; }

function parseCSV(text){ const rows=[];let row=[],cur='',q=false; text=text.replace(/^\uFEFF/,'');
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else { if(ch==='"')q=true; else if(ch===','){row.push(cur);cur='';}
      else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(ch==='\r'){} else cur+=ch; } }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(c=>String(c).trim()!=='')); }
function toObjects(rows){ if(!rows.length)return[]; const head=rows[0].map(h=>String(h).trim().toLowerCase());
  return rows.slice(1).map(r=>{const o={};head.forEach((h,i)=>o[h]=r[i]!=null?String(r[i]).trim():'');return o;}); }
const pick=(o,...k)=>{for(const key of k){const v=o[key.toLowerCase()];if(v!=null&&v!=='')return v;}return '';};

/* ===================== RENDER ===================== */
function render(invNo){
  const inv=INVOICES.find(x=>x.no===invNo);
  const sheet=document.getElementById('sheet'), warn=document.getElementById('warn');
  warn.classList.remove('show'); warn.innerHTML='';
  if(!inv){sheet.innerHTML='';return;}
  const S=seller(), cust=findCustomer(inv), lines=DETAILS.filter(d=>d.inv===inv.no);
  const net=inv.unitTotal, vat=inv.taxTotal, gross=inv.invoiceTotal, rate=inv.taxRate||0.20;

  const sumNet=lines.reduce((a,l)=>a+num(l.unit),0), msgs=[];
  if(!cust) msgs.push('No matching customer for company "'+esc(inv.company)+'".');
  if(lines.length===0) msgs.push('No line items for '+inv.no+' — import the Details CSV.');
  else if(Math.abs(sumNet-net)>0.01) msgs.push('Line items sum to '+money(sumNet)+' net vs header '+money(net)+' — detail list looks incomplete. Header totals shown as authoritative.');
  if(msgs.length){warn.innerHTML='⚠ '+msgs.join('<br>⚠ ');warn.classList.add('show');}

  const sln=(label,val)=>val?`<div class="sub"><b>${label}</b> ${esc(val)}</div>`:'';
  const fromBlock=`
      <div class="name">${esc(S.name)}</div>
      ${S.a1?`<div class="ln">${esc(S.a1)}</div>`:''}
      ${S.a2?`<div class="ln">${esc(S.a2)}</div>`:''}
      ${sln('Tel',S.phone)}${sln('Email',S.email)}${sln('VAT',S.vat)}`;
  const billBlock = cust ? `
      <div class="name">${esc(cust.name)}</div>
      ${cust.contact?`<div class="ln">${esc(cust.contact)}</div>`:''}
      ${cust.a1?`<div class="ln">${esc(cust.a1)}</div>`:''}
      ${cust.a2?`<div class="ln">${esc(cust.a2)}</div>`:''}
      <div class="ln">${esc([cust.town,cust.postcode].filter(Boolean).join(', '))}</div>
      ${sln('Tel',cust.phone)}${sln('Email',cust.email)}`
    : `<div class="name">${esc(inv.company||'Unknown customer')}</div>`;

  const rowsHTML = lines.length ? lines.map(l=>`
        <tr><td>${esc(l.item)}</td><td class="desc">${esc(l.desc)}</td>
          <td class="c num">${esc(l.qty)}</td><td class="r num">${money(l.unit)}</td>
          <td class="r num">${money(l.tax)}</td><td class="r amt num">${money(l.total)}</td></tr>`).join('')
    : `<tr><td></td><td class="desc" style="color:var(--muted)">Line items not loaded — import the Details CSV.</td><td></td><td></td><td></td><td></td></tr>`;
  const due=addDays(inv.date,S.terms);

  sheet.innerHTML=`
    <header class="inv">
      <div class="logo-row">
        <div class="emblem">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="3"  y="13" width="3.4" height="8"  rx="1" fill="#fff" opacity=".55"/>
            <rect x="8.3" y="9" width="3.4" height="12" rx="1" fill="#fff" opacity=".75"/>
            <rect x="13.6" y="5" width="3.4" height="16" rx="1" fill="#fff"/>
            <path d="M3.5 11.5 9 7.5 14 9.5 20.5 3.5" stroke="#9FE9DF" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="20.5" cy="3.5" r="1.9" fill="#13C6B6"/>
          </svg>
        </div>
        <div class="wordmark">
          <span class="p">Power</span><span class="a">Analytix</span>
          ${S.tag?`<span class="tag">${esc(S.tag)}</span>`:''}
        </div>
      </div>
      <div class="doc-title"><h1>INVOICE</h1><div class="inv-no">${esc(inv.no)}</div></div>
    </header>
    <div class="rule"></div>

    <section class="meta">
      <div class="block"><div class="eyebrow">From</div>${fromBlock}</div>
      <div class="block"><div class="eyebrow">Bill To</div>${billBlock}</div>
      <div class="block"><div class="eyebrow">Details</div>
        <div class="detail-row"><span>Invoice no.</span><span>${esc(inv.no)}</span></div>
        <div class="detail-row"><span>Invoice date</span><span>${fmtDate(inv.date)}</span></div>
        ${due?`<div class="detail-row due"><span>Due by</span><span>${due}</span></div>`:''}
      </div>
    </section>

    <div class="invfor"><b>Invoice for:</b>&nbsp; ${esc(inv.project)}</div>

    <table class="items">
      <thead><tr><th>Item #</th><th>Description</th><th class="c">Qty</th>
        <th class="r">Unit price</th><th class="r">VAT</th><th class="r">Amount</th></tr></thead>
      <tbody>${rowsHTML}</tbody>
    </table>

    <div class="foot">
      <div class="pay">
        <div class="eyebrow">Payment Details</div>
        <div class="pay-grid">
          ${S.account?`<span class="k">Payee</span><span class="v">${esc(S.name)}</span>`:''}
          ${S.sort?`<span class="k">Sort code</span><span class="v num">${esc(S.sort)}</span>`:''}
          ${S.account?`<span class="k">Account no.</span><span class="v num">${esc(S.account)}</span>`:''}
          <span class="k">Reference</span><span class="v">${esc(inv.no)}</span>
        </div>
        <div class="terms"><b>Payment terms:</b> Total due within ${S.terms} working days.
          Please quote the invoice number above with your payment.${S.account?` Cheques payable to ${esc(S.name)}.`:''}</div>
      </div>
      <div class="totals">
        <div class="tline"><span class="k">Subtotal (net)</span><span class="v num">${money(net)}</span></div>
        <div class="tline sep"><span class="k">VAT @ ${(rate*100).toFixed(2)}%</span><span class="v num">${money(vat)}</span></div>
        <div class="grand"><span class="k">Total Due</span><span class="v num">${money(gross)}</span></div>
      </div>
    </div>

    <div class="baseline">
      <span>Thank you for your business.</span>
      ${S.vat?`<span class="vat">VAT Registration No. ${esc(S.vat)}</span>`:`<span>${esc(S.name)}</span>`}
    </div>`;
}

/* ===================== UI ===================== */
function refreshSelect(keep){
  const sel=document.getElementById('invoiceSelect');
  sel.innerHTML=INVOICES.map(i=>`<option value="${esc(i.no)}">${esc(i.no)} — ${esc(i.project||'')}</option>`).join('');
  if(keep&&INVOICES.some(i=>i.no===keep)) sel.value=keep;
  render(sel.value);
}
function refreshStatus(){ document.getElementById('status').innerHTML=
  `<span><b>${CUSTOMERS.length}</b> customers</span><span><b>${INVOICES.length}</b> invoices</span><span><b>${DETAILS.length}</b> line items</span>`; }

document.getElementById('invoiceSelect').addEventListener('change',e=>render(e.target.value));
document.querySelectorAll('.cfg').forEach(el=>el.addEventListener('input',()=>render(document.getElementById('invoiceSelect').value)));

function wireImport(id,handler){
  document.getElementById(id).addEventListener('change',function(ev){
    const f=ev.target.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{try{handler(toObjects(parseCSV(r.result)));refreshStatus();
      refreshSelect(document.getElementById('invoiceSelect').value);}
      catch(err){alert('Could not read '+f.name+': '+err.message);}};
    r.readAsText(f); ev.target.value=''; });
}
wireImport('impCustomers',objs=>{CUSTOMERS=objs.map(o=>({num:num(pick(o,'company #','company#','company number','num','id')),
  name:pick(o,'company name','name'),contact:pick(o,'contact name','contact'),a1:pick(o,'address 1','address1'),
  a2:pick(o,'address 2','address2'),town:pick(o,'address','town','city'),postcode:pick(o,'postcode','post code','zip'),
  phone:pick(o,'phone','tel'),email:pick(o,'email')})).filter(c=>c.name);});
wireImport('impInvoices',objs=>{INVOICES=objs.map(o=>({no:pick(o,'invoice #','invoice#','invoice no','invoice'),
  company:pick(o,'company'),date:pick(o,'invoice date','date'),project:pick(o,'project description','project','description'),
  taxRate:parseRate(pick(o,'tax rate','vat rate','rate')||'20%'),taxTotal:num(pick(o,'tax total','vat total','tax')),
  unitTotal:num(pick(o,'unit total','net total','subtotal','net')),invoiceTotal:num(pick(o,'invoice total','total','gross'))})).filter(i=>i.no);});
wireImport('impDetails',objs=>{DETAILS=objs.map(o=>({desc:pick(o,'description','site','customer'),
  inv:pick(o,'invoice #','invoice#','invoice no','invoice'),item:pick(o,'item #','item#','item','ref'),
  qty:num(pick(o,'qty','quantity'))||1,unit:num(pick(o,'unit price','unit','net','price')),
  tax:num(pick(o,'tax','vat')),total:num(pick(o,'total','amount','line total'))})).filter(d=>d.inv);});

/* ===================== SHAREPOINT CONNECTION =====================
   Same MSAL + Graph delegated-auth pattern as the timesheet app.
   FILL IN the 4 placeholders below (siteId + 3 list IDs), then host the
   file and add its URL as an SPA redirect URI in the Entra app registration.
================================================================== */
const CONFIG = {
  clientId:    "f76b090f-7d46-447b-8545-954d22814232",   // shared Power Analytix app reg
  tenantId:    "be344548-8db6-49d6-8155-1f85b6ae1dad",
  redirectUri: "https://invoices.poweranalytix.co.uk/",  // <-- where you host this; must match Entra SPA redirect URI exactly
  siteId:      "netorgft7286889.sharepoint.com,7dbdec72-9051-417c-aa77-60ddcb37ce04,05fda148-0a25-40ac-b274-a47edcacdfbb",
  lists: {
    customers: "0d189597-934f-4d29-9864-2aed058f60ec",
    invoices:  "c220e603-0688-4f8c-a74a-60867aff26d6",
    details:   "0e69694e-f603-4f10-a583-f2c15e99d6d9"
  }
};
const GRAPH="https://graph.microsoft.com/v1.0";
const SCOPES=["User.Read","Sites.ReadWrite.All"];
const msalConfig={auth:{clientId:CONFIG.clientId,
  authority:"https://login.microsoftonline.com/"+CONFIG.tenantId,redirectUri:CONFIG.redirectUri},
  cache:{cacheLocation:"sessionStorage",storeAuthStateInCookie:false}};
let msalInstance=null, account=null;
const configured = !String(CONFIG.siteId).includes("PASTE") &&
  !Object.values(CONFIG.lists).some(v=>String(v).includes("PASTE"));

function setConn(text,state){ // state: '', 'on', 'err'
  document.getElementById('connWho').textContent=text;
  const dot=document.getElementById('connDot'); dot.className='dot'+(state?' '+state:'');
}
async function initAuth(){
  try{
    msalInstance=new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    const r=await msalInstance.handleRedirectPromise();
    if(r&&r.account) account=r.account;
    if(!account){const a=msalInstance.getAllAccounts(); if(a.length) account=a[0];}
    if(account){ onSignedIn(); }
  }catch(e){ console.error("MSAL init",e); setConn("Sign-in error — see console",'err'); }
}
function onSignedIn(){
  setConn("Signed in as "+(account.name||account.username),'on');
  document.getElementById('connectBtn').style.display='none';
  document.getElementById('reloadBtn').style.display='';
  document.getElementById('signoutBtn').style.display='';
  if(configured) loadFromSharePoint();
  else setConn("Signed in — add your siteId + list IDs in CONFIG to load live data",'err');
}
async function getToken(){
  try{ const r=await msalInstance.acquireTokenSilent({scopes:SCOPES,account}); return r.accessToken; }
  catch(e){ await msalInstance.acquireTokenRedirect({scopes:SCOPES}); throw e; }
}
async function getList(token,listId){
  const url=GRAPH+"/sites/"+CONFIG.siteId+"/lists/"+listId+"/items?$expand=fields&$top=500";
  const res=await fetch(url,{headers:{Authorization:"Bearer "+token,
    Prefer:"HonorNonIndexedQueriesWarningMayFailRandomly"}});
  if(!res.ok) throw new Error("List "+listId+" → "+res.status);
  const data=await res.json(); return (data.value||[]).map(i=>{const f=i.fields||{}; f._itemId=i.id; return f;});
}
async function loadFromSharePoint(){
  setConn("Loading from SharePoint…",'on');
  try{
    const token=await getToken();
    const [cust,inv,det]=await Promise.all([
      getList(token,CONFIG.lists.customers),
      getList(token,CONFIG.lists.invoices),
      getList(token,CONFIG.lists.details)
    ]);
    CUSTOMERS=cust.map(f=>({num:num(f._itemId), name:f.CompanyName||f.Title||"", contact:f.ContactName||"",
      a1:f.Address1||"", a2:f.Address2||"", town:f.Town||"", postcode:f.Postcode||"",
      phone:f.Phone||"", email:f.Email||""})).filter(c=>c.name);
    // map invoice item-ID -> InvoiceNo so detail lookups resolve even if display value is missing
    const invNoById={}; inv.forEach(f=>{ invNoById[f._itemId]=f.InvoiceNo||f.Title||""; });
    INVOICES=inv.map(f=>({no:f.InvoiceNo||f.Title||"", company:String(f.CustomerLookupLookupId??""),
      date:f.InvoiceDate||"", project:f.Project||"", taxRate:parseRate(f.TaxRate??0.20),
      taxTotal:num(f.TaxTotal), unitTotal:num(f.UnitTotal), invoiceTotal:num(f.InvoiceTotal)})).filter(i=>i.no);
    DETAILS=det.map(f=>({desc:f.LineDescription||f.Title||"", item:f.ItemNo||"",
      inv:f.InvoiceLookup||invNoById[f.InvoiceLookupLookupId]||"",
      qty:num(f.Qty)||1, unit:num(f.UnitPrice), tax:num(f.Tax), total:num(f.LineTotal)})).filter(d=>d.inv);
    refreshStatus();
    refreshSelect(document.getElementById('invoiceSelect').value);
    setConn("Loaded "+INVOICES.length+" invoices from SharePoint · "+(account.name||account.username),'on');
  }catch(e){ console.error(e); setConn("Couldn't load lists — "+e.message,'err'); }
}
document.getElementById('connectBtn').onclick=()=>msalInstance
  ? msalInstance.loginRedirect({scopes:SCOPES})
  : setConn("Auth not ready — refresh the page",'err');
document.getElementById('reloadBtn').onclick=()=>loadFromSharePoint();
document.getElementById('signoutBtn').onclick=()=>msalInstance.logoutRedirect({account});

refreshStatus();
refreshSelect('UMS-1606-1');
initAuth();
</script>
